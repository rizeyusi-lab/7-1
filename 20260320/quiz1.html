    //1. 내 이름을 for문 이용, 7번 출력

    document.write("<br>------------------<br>");
    //2. 내 이름을 while문 이용, 7번 출력
    var k=0;
while (k<7) {
    document.write("김영인<br>");
    k=k+1;
}
</script>
